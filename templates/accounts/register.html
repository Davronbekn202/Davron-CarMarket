{% extends 'main.html' %}
{% block title %}
    <title>Register</title>
{% endblock %}

{% block content%}

<style>
    .register-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
        padding: 20px 0 60px;
    }

    .register-card {
        width: 100%;
        max-width: 480px;
        background: #111111;
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px;
        overflow: hidden;
    }

    .register-header {
        position: relative;
        padding: 32px 32px 28px;
        background: #161616;
        border-bottom: 1px solid rgba(201,168,76,0.12);
        overflow: hidden;
    }

    .register-header::before {
        content: '';
        position: absolute;
        top: -60px;
        right: -60px;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, transparent 70%);
        pointer-events: none;
    }

    .register-header .eyebrow {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #c9a84c;
        margin-bottom: 8px;
    }

    .register-header h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 36px;
        letter-spacing: 2px;
        color: #f0ece4;
        margin: 0;
        line-height: 1;
    }

    .register-body {
        padding: 28px 32px 32px;
    }

    /* Django form.as_p styling */
    .register-body p {
        margin-bottom: 16px;
    }

    .register-body label {
        display: block;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #5a5550;
        margin-bottom: 8px;
    }

    .register-body input,
    .register-body select,
    .register-body textarea {
        width: 100%;
        padding: 12px 16px;
        background: #0a0a0a;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 6px;
        color: #f0ece4;
        font-family: 'Outfit', sans-serif;
        font-size: 14px;
        outline: none;
        transition: border-color 0.25s;
        appearance: none;
    }

    .register-body input::placeholder,
    .register-body textarea::placeholder {
        color: #3a3530;
    }

    .register-body input:focus,
    .register-body select:focus,
    .register-body textarea:focus {
        border-color: rgba(201,168,76,0.5);
    }

    /* Help text & errors from Django */
    .register-body .helptext,
    .register-body span.helptext {
        display: block;
        font-size: 11px;
        color: #5a5550;
        margin-top: 5px;
        line-height: 1.5;
    }

    .register-body ul.errorlist {
        list-style: none;
        margin: 6px 0 0;
        padding: 0;
    }

    .register-body ul.errorlist li {
        font-size: 12px;
        color: #e74c3c;
        background: rgba(192,57,43,0.08);
        border: 1px solid rgba(192,57,43,0.25);
        border-radius: 4px;
        padding: 6px 10px;
        margin-top: 4px;
    }

    .btn-register {
        width: 100%;
        padding: 13px;
        margin-top: 4px;
        background: #c9a84c;
        color: #0a0a0a;
        font-family: 'Outfit', sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.25s, transform 0.2s;
    }

    .btn-register:hover {
        background: #e8c96a;
        transform: translateY(-1px);
    }

    /* Google button */
    .btn-google {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 12px;
        padding: 12px;
        background: transparent;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 6px;
        color: #a09a92;
        font-family: 'Outfit', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1px;
        text-decoration: none;
        text-transform: uppercase;
        transition: border-color 0.25s, color 0.25s;
    }

    .btn-google:hover {
        border-color: rgba(255,255,255,0.25);
        color: #f0ece4;
    }

    .btn-google svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
    }

    .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 16px 0;
    }

    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: rgba(255,255,255,0.06);
    }

    .divider span {
        font-size: 11px;
        color: #3a3530;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    /* Footer links */
    .register-footer {
        padding: 18px 32px 24px;
        border-top: 1px solid rgba(255,255,255,0.04);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .register-footer a {
        font-size: 13px;
        text-decoration: none;
        transition: color 0.2s;
    }

    .link-login {
        color: #c9a84c;
    }

    .link-login:hover {
        color: #e8c96a;
    }

    .link-back {
        color: #5a5550;
    }

    .link-back:hover {
        color: #a09a92;
    }
</style>

<div class="register-wrapper">
    <div class="register-card">

        <div class="register-header">
            <p class="eyebrow">Create Account</p>
            <h1>Register</h1>
        </div>

        <div class="register-body">
            <form method="POST">
                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn-register">Register</button>
            </form>

            <div class="divider"><span>or</span></div>

            <a href="{% url 'accounts:google-auth' %}" class="btn-google">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </a>
        </div>

        <div class="register-footer">
            <a href="{% url 'accounts:login' %}" class="link-login">Already have an account?</a>
            <a href="{% url 'carapp:base' %}" class="link-back">Back</a>
        </div>

    </div>
</div>

{% endblock %}
