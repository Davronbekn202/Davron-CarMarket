{% extends 'base.html' %}
{% block title %}
<title>Login</title>
{% endblock %}

{% block content%}

<h1>Login</h1>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username">
    <br><br>
    <input type="password" name="password" placeholder="Password">
    <br><br>

    <button type="submit">Login</button>

</form>

<a href="{% url 'accounts:register' %}">Register</a>

<a href="{% url 'carapp:base' %}">Back</a>
<a href="{% url 'accounts:forgot' %}">Forget password</a>
{% endblock %}
