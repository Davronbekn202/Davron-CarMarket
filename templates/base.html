<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davron Car Market</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #f5f5f5;
        }

        header{
            width: 100%;
            background: #111827;
            padding: 18px 50px;
        }

        .navbar{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo{
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-links{
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a{
            color: white;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .nav-links a:hover{
            color: #3b82f6;
        }

        .btn{
            padding: 8px 18px;
            border-radius: 6px;
            background: #2563eb;
            color: white !important;
        }

        .btn:hover{
            background: #1d4ed8;
            color: white !important;
        }

        .content{
            padding: 30px 50px;
        }
    </style>
</head>
<body>

<header>
    <div class="navbar">

        <a href="/" class="logo">Davron Car Market</a>

        <div class="nav-links">
            <a href="#">Cars</a>
            <a href="#">About</a>
            <a href="#">Contact</a>

            {% if user.is_authenticated %}
                <a href="{% url 'accounts:profile' %}">Profile</a>
                <a href="{% url 'accounts:logout' %}" class="btn">Logout</a>
            {% else %}
                <a href="{% url 'accounts:register' %}">Register</a>
                <a href="{% url 'accounts:login' %}" class="btn">Login</a>
            {% endif %}
        </div>

    </div>
</header>

<h1>Base</h1>
<div class="content">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
