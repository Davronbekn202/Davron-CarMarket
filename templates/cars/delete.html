{% extends 'main.html' %}

{% block content %}

<style>
    .delete-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
    }

    .delete-card {
        width: 100%;
        max-width: 420px;
        background: #111111;
        border: 1px solid rgba(192,57,43,0.2);
        border-radius: 12px;
        overflow: hidden;
    }

    .delete-header {
        position: relative;
        padding: 32px 32px 28px;
        background: #161616;
        border-bottom: 1px solid rgba(192,57,43,0.12);
        overflow: hidden;
    }

    .delete-header::before {
        content: '';
        position: absolute;
        top: -60px;
        right: -60px;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(192,57,43,0.07) 0%, transparent 70%);
        pointer-events: none;
    }

    .delete-header .eyebrow {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #e74c3c;
        margin-bottom: 8px;
    }

    .delete-header h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 36px;
        letter-spacing: 2px;
        color: #f0ece4;
        margin: 0;
        line-height: 1;
    }

    .delete-body {
        padding: 28px 32px 32px;
        text-align: center;
    }

    .warning-icon {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(192,57,43,0.1);
        border: 1px solid rgba(192,57,43,0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
    }

    .warning-icon svg {
        width: 26px;
        height: 26px;
        stroke: #e74c3c;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .delete-body p {
        font-size: 15px;
        color: #8a8680;
        line-height: 1.6;
        margin-bottom: 28px;
    }

    .delete-body p strong {
        color: #f0ece4;
        font-weight: 600;
    }

    .delete-actions {
        display: flex;
        gap: 10px;
    }

    .delete-actions a,
    .delete-actions button {
        flex: 1;
        display: block;
        text-align: center;
        padding: 12px 0;
        border-radius: 6px;
        font-family: 'Outfit', sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        text-decoration: none;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s;
    }

    .btn-cancel {
        background: transparent;
        border: 1px solid rgba(255,255,255,0.1);
        color: #a09a92;
    }

    .btn-cancel:hover {
        border-color: rgba(255,255,255,0.25);
        color: #f0ece4;
    }

    .btn-delete {
        background: #c0392b;
        border: none;
        color: #fff;
    }

    .btn-delete:hover {
        background: #e74c3c;
        transform: translateY(-1px);
    }
</style>

<div class="delete-wrapper">
    <div class="delete-card">

        <div class="delete-header">
            <p class="eyebrow">Danger Zone</p>
            <h1>Delete Car</h1>
        </div>

        <div class="delete-body">

            <div class="warning-icon">
                <svg viewBox="0 0 24 24"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
            </div>

            <p>Are you sure you want to delete this car? <strong>This action cannot be undone.</strong></p>

            <form method="post">
                {% csrf_token %}
                <div class="delete-actions">
                    <a href="javascript:history.back()" class="btn-cancel">Cancel</a>
                    <button type="submit" class="btn-delete">Yes, Delete</button>
                </div>
            </form>

        </div>

    </div>
</div>

{% endblock %}
